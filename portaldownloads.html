<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Agora de Comunicação</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8001D;
    --dark: #0a0a0a;
    --panel: #111111;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #888888;
    --accent: #FF3B56;
    --gold: #FFB800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .logo-text span { color: var(--red); }

  .header-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── MAIN ── */
  main {
    padding-top: 64px;
    min-height: 100vh;
  }

  /* ── HERO / MAP SECTION ── */
  .hero {
    position: relative;
    min-height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .hero-logo {
    margin-bottom: 30px;
    text-align: center;
  }
  .hero-logo img {
    width: clamp(180px, 30vw, 280px);
    height: auto;
    filter: drop-shadow(0 0 24px rgba(232,0,29,0.3));
  }

  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 40px;
  }

  /* ── MAP WRAPPER ── */
  .map-wrapper {
    position: relative;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }

  .map-container {
    position: relative;
    width: 100%;
    user-select: none;
    -webkit-user-select: none;
  }

  .mt-map-img {
    width: 100%;
    height: auto;
    display: block;
    /* Invert: white bg becomes dark, black shape becomes light */
    filter: invert(1) brightness(0.18) sepia(1) hue-rotate(320deg) saturate(3);
    filter: invert(0.85) brightness(0.35) sepia(0.4) saturate(2) hue-rotate(330deg);
    /* Simple: make the black MT shape a dark red-tinted color */
    filter: brightness(0.22) sepia(1) saturate(3) hue-rotate(310deg);
  }

  .mt-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: visible;
  }

  /* ── CITY BUTTONS ── */
  .city-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    margin: 18px auto 0;
  }

  .city-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 60px;
  }

  .city-btn:hover,
  .city-btn:active {
    background: #1d1010;
    border-color: var(--red);
    transform: translateY(-2px);
  }

  .city-btn-dot {
    flex-shrink: 0;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px var(--red); }
    50%       { box-shadow: 0 0 14px var(--red), 0 0 20px rgba(232,0,29,0.4); }
  }

  .city-btn-name {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .city-btn-sub {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    color: var(--muted);
    display: block;
    white-space: nowrap;
  }

  .city-btn-arrow {
    color: var(--red);
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* Wrap name + sub together */
  .city-btn-name { display: flex; flex-direction: column; gap: 2px; }

  /* City dot + label (SVG — mantido por compatibilidade mas escondido) */
  .city-group { display: none; }
  .mt-overlay { display: none; }

  /* ── OVERLAY PANELS ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.active { display: flex; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--panel);
    z-index: 1;
  }

  .panel-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--text);
  }
  .panel-header h2 span { color: var(--red); }

  .btn-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }

  .panel-body { padding: 20px 28px 28px; }

  /* ── EMISSORA CARDS ── */
  .emissora-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #161616;
  }
  .emissora-card:hover {
    border-color: var(--red);
    background: #1d1010;
    transform: translateX(4px);
  }

  .emissora-info { display: flex; flex-direction: column; gap: 3px; }
  .emissora-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .emissora-type {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .emissora-arrow {
    color: var(--red);
    font-size: 20px;
    transition: transform 0.2s;
  }
  .emissora-card:hover .emissora-arrow { transform: translateX(4px); }

  /* ── DRIVE FILE LIST ── */
  /* ── FILE CARDS (V1 style) ── */
  .file-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .file-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Search bar */
  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap .ico {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); color: var(--muted);
    pointer-events: none; display: flex;
  }
  #searchInput {
    width: 100%; padding: 11px 16px 11px 44px;
    background: #161616; border: 1px solid var(--border);
    border-radius: 50px; color: var(--text);
    font-family: 'Barlow', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(232,0,29,0.15); }

  /* Counter */
  .counter-badge {
    display: flex; align-items: center; gap: 8px;
    background: #161616; border: 1px solid var(--border);
    border-radius: 50px; padding: 8px 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; color: var(--muted);
    margin-bottom: 16px; width: fit-content;
  }
  .counter-badge .count-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--red); line-height: 1;
  }

  /* Loader */
  #files-loader {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 60px 20px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(232,0,29,0.15);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #files-loader p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--muted);
  }

  /* Msg box */
  #files-msg {
    display: none; text-align: center; padding: 60px 20px;
  }
  #files-msg .msg-icon { font-size: 50px; margin-bottom: 14px; opacity: .4; }
  #files-msg h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px; letter-spacing: 2px;
    color: var(--muted); margin-bottom: 8px;
  }
  #files-msg p { font-size: 13px; color: var(--muted); line-height: 1.7; }

  /* File grid */
  #file-grid { display: none; }

  /* File card */
  .file-card {
    background: #161616; border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
    margin-bottom: 10px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .file-card:hover {
    transform: translateY(-2px);
    border-color: rgba(232,0,29,0.4);
    box-shadow: 0 8px 28px rgba(232,0,29,0.15);
  }
  .pdf-icon {
    flex-shrink: 0; width: 42px; height: 52px;
    background: linear-gradient(145deg, #3a0000 0%, var(--red) 100%);
    border-radius: 7px; display: flex; align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 12px;
    letter-spacing: 1px; color: white;
    box-shadow: 0 4px 12px rgba(232,0,29,0.35);
    position: relative; overflow: hidden;
  }
  .pdf-icon::after {
    content: ''; position: absolute; top: 0; right: 0;
    width: 12px; height: 12px;
    background: rgba(255,255,255,0.2);
    clip-path: polygon(100% 0, 100% 100%, 0 0);
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-weight: 600; font-size: 14px; color: var(--text);
    line-height: 1.4; word-break: break-word; margin-bottom: 4px;
  }
  .file-meta {
    font-size: 11px; color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 4px;
  }
  .file-actions { display: flex; gap: 7px; flex-wrap: wrap; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 13px; border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: .5px;
    text-decoration: none; cursor: pointer; border: none;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 12px; height: 12px; }
  .btn-view { background: var(--red); color: white; }
  .btn-view:hover { background: #ff1a33; box-shadow: 0 4px 14px rgba(232,0,29,0.5); }
  .btn-download { background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border); }
  .btn-download:hover { background: rgba(255,255,255,0.13); color: white; }
  .btn-whatsapp {
    background: rgba(37,211,102,0.1); color: #25d366;
    border: 1px solid rgba(37,211,102,0.22);
  }
  .btn-whatsapp:hover {
    background: rgba(37,211,102,0.2); color: #2be870;
    border-color: rgba(37,211,102,0.5);
    box-shadow: 0 4px 12px rgba(37,211,102,0.2);
  }

  /* Back button inside panel */
  .btn-back {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .btn-back:hover { color: var(--red); }

  .error-msg {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .error-msg a {
    color: var(--red);
    text-decoration: none;
  }
  .error-msg a:hover { text-decoration: underline; }

  /* ── BOTTOM BAR ── */
  .bottom-hint {
    text-align: center;
    margin-top: 30px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    header { padding: 0 16px; height: 56px; }
    .logo-text { font-size: 18px; letter-spacing: 1px; }
    .header-tag { display: none; }
    .hero { padding: 16px 12px 28px; }
    .hero-logo img { width: 150px; }
    .hero-sub { font-size: 11px; letter-spacing: 3px; margin-bottom: 18px; }
    .map-wrapper { max-width: 100%; }
    .city-buttons { grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
    .city-btn { padding: 12px 12px; min-height: 54px; }
    .city-btn-name { font-size: 13px; }
    .bottom-hint { font-size: 10px; letter-spacing: 2px; margin-top: 16px; }
    .panel { border-radius: 20px 20px 0 0; max-height: 94vh; }
    .overlay { align-items: flex-end; padding: 0; }
    .panel-header { padding: 16px 16px; }
    .panel-body { padding: 14px 14px 32px; }
    .emissora-card { padding: 14px 14px; }
    .emissora-name { font-size: 15px; }
    .file-card { padding: 12px 12px; gap: 10px; }
    .file-actions { gap: 5px; }
    .btn { padding: 7px 10px; font-size: 11px; }
    #searchInput { font-size: 15px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }
</style>
</head>

<script>

let currentCity = null;

// ── UTILITÁRIOS ───────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return 'Data desconhecida';
  return new Date(iso).toLocaleDateString('pt-BR', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
function stripExt(name) { return name.replace(/\.pdf$/i, ''); }

// ── CRIAR CARD DE ARQUIVO (igual ao V1) ───────────────────────
function createCard(file, index) {
  const viewUrl = `https://drive.google.com/file/d/${file.id}/view`;
  const dlUrl   = `https://drive.google.com/uc?export=download&id=${file.id}`;
  const name    = stripExt(file.name);
  const date    = formatDate(file.modifiedTime);
  const card    = document.createElement('div');
  card.className = 'file-card';
  card.setAttribute('role', 'listitem');
  card.style.animationDelay = `${Math.min(index * 0.055, 0.6)}s`;
  card.innerHTML = `
    <div class="pdf-icon" aria-hidden="true">PDF</div>
    <div class="file-info">
      <div class="file-name" title="${file.name}">${name}</div>
      <div class="file-meta">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>

            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Visualizar
        </a>
        <a class="btn btn-download" href="${dlUrl}" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Baixar
        </a>
        <a class="btn btn-whatsapp" href="#" onclick="return sendWhatsApp(event,'${file.id}','${name.replace(/'/g, "\\'")}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>

// ── RENDERIZAR LISTA DE ARQUIVOS ──────────────────────────────
function renderFiles(files) {
  const grid  = document.getElementById('file-grid');
  const msg   = document.getElementById('files-msg');
  const count = document.getElementById('file-count');
  grid.innerHTML = '';
  if (files.length === 0) {
    grid.style.display = 'none';
    document.getElementById('files-msg-icon').textContent  = '🔍';
    document.getElementById('files-msg-title').textContent = 'Nenhum resultado';
    document.getElementById('files-msg-text').textContent  = 'Nenhum arquivo corresponde à sua busca.';
    msg.style.display = 'block';
    return;
  }
  msg.style.display   = 'none';
  grid.style.display  = 'block';
  if (count) count.textContent = files.length;
  files.forEach((f, i) => grid.appendChild(createCard(f, i)));
}

// ── BUSCAR ARQUIVOS VIA GOOGLE DRIVE API ──────────────────────
async function fetchDriveFiles(folderId) {
  const loader = document.getElementById('files-loader');
  const grid   = document.getElementById('file-grid');
  const msg    = document.getElementById('files-msg');
  const count  = document.getElementById('file-count');

  loader.style.display = 'flex';
  grid.style.display   = 'none';
  msg.style.display    = 'none';

  const q      = encodeURIComponent(`'${folderId}' in parents and mimeType='application/pdf' and trashed=false`);
  const fields = encodeURIComponent('files(id,name,modifiedTime),nextPageToken');
  const order  = encodeURIComponent('modifiedTime desc');
  let fetched = [], pageToken = '';

  try {
    do {
      let url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&orderBy=${order}&pageSize=200&key=${GOOGLE_API_KEY}`;
      if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;
      const resp = await fetch(url);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.error?.message || `Erro HTTP ${resp.status}`);
      }
      const data = await resp.json();
      fetched    = fetched.concat(data.files || []);
      pageToken  = data.nextPageToken || '';
    } while (pageToken);

    allFiles = fetched;
    if (count) count.textContent = allFiles.length;
    loader.style.display = 'none';

    if (allFiles.length === 0) {
      document.getElementById('files-msg-icon').textContent  = '📭';
      document.getElementById('files-msg-title').textContent = 'Nenhum arquivo encontrado';
      document.getElementById('files-msg-text').textContent  = 'Esta pasta não contém arquivos PDF. Verifique se a pasta está pública.';
      msg.style.display = 'block';
      return;
    }
    renderFiles(allFiles);

    // bind search
    const si = document.getElementById('searchInput');
    if (si) {
      si.oninput = () => {
        const q2 = si.value.trim().toLowerCase();
        renderFiles(q2 ? allFiles.filter(f => f.name.toLowerCase().includes(q2)) : allFiles);
      };
    }

  } catch(err) {
    console.error(err);
    loader.style.display = 'none';
    document.getElementById('files-msg-icon').textContent  = '⚠️';
    document.getElementById('files-msg-title').textContent = 'Erro ao carregar';
    document.getElementById('files-msg-text').textContent  = `${err.message}. Verifique se a API Key está ativa e a pasta é pública.`;
    msg.style.display = 'block';
  }
}

// ── WHATSAPP ──────────────────────────────────────────────────
function sendWhatsApp(event, fileId, fileName) {
  event.preventDefault();
  event.stopPropagation();
  const emName  = currentEmissora ? currentEmissora.name : 'Emissora';
  const fileUrl = `https://drive.google.com/file/d/${fileId}/view`;
  const text    = `📄 *${fileName}*\n\nEmissora: *${emName}*\nGrupo Agora de Comunicação\n\n🔗 ${fileUrl}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  return false;
}

// ── ABRIR CIDADE ──────────────────────────────────────────────
function openCity(cityKey) {
  currentCity = cityKey;
  const city = CITIES[cityKey];
  if (!city) return;

  document.getElementById('city-panel-title').innerHTML =
    city.name.split(' ').map((w,i) => i === 0 ? `<span>${w}</span>` : w).join(' ');

  const body = document.getElementById('city-panel-body');
  body.innerHTML = `
    <div class="file-section-label">${city.emissoras.length} emissoras disponíveis</div>
    ${city.emissoras.map(e => `
      <div class="emissora-card" onclick="openEmissora('${cityKey}','${e.id}')">
        <div class="emissora-info">
          <div class="emissora-name">${e.name}</div>
          <div class="emissora-type">${e.type}</div>
        </div>
        <div class="emissora-arrow">›</div>
      </div>
    `).join('')}
  `;

  document.getElementById('overlay-city').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeCity() {
  document.getElementById('overlay-city').classList.remove('active');
  document.body.style.overflow = '';
  currentCity = null;
}

// ── ABRIR EMISSORA (arquivos) ─────────────────────────────────
function openEmissora(cityKey, emId) {
  const city = CITIES[cityKey];
  const em   = city.emissoras.find(e => e.id === emId);
  if (!em) return;
  currentEmissora = em;
  allFiles = [];

  document.getElementById('files-panel-title').innerHTML =
    `<span>${em.name.split(' ')[0]}</span> ${em.name.split(' ').slice(1).join(' ')}`;

  document.getElementById('files-panel-body').innerHTML = `
    <button class="btn-back" onclick="backToCity()">← Voltar para ${city.name}</button>

    <div class="file-section-label">Arquivos disponíveis</div>

    <!-- search + counter -->
    <div class="search-wrap">
      <span class="ico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="search" id="searchInput" placeholder="Buscar arquivo por nome…" autocomplete="off"/>
    </div>
    <div class="counter-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <span class="count-num" id="file-count">–</span>
      <span>arquivo(s) PDF</span>
    </div>

    <!-- loader -->
    <div id="files-loader">
      <div class="spinner"></div>
      <p>Carregando arquivos…</p>
    </div>

    <!-- msg -->
    <div id="files-msg">
      <div class="msg-icon" id="files-msg-icon">📭</div>
      <h3 id="files-msg-title">Nenhum arquivo encontrado</h3>
      <p id="files-msg-text">Esta pasta não contém arquivos PDF no momento.</p>
    </div>

    <!-- grid -->
    <div id="file-grid" role="list"></div>
  `;

  document.getElementById('overlay-city').classList.remove('active');
  document.getElementById('overlay-files').classList.add('active');

  fetchDriveFiles(em.folder);
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────
function backToCity() {
  document.getElementById('overlay-files').classList.remove('active');
  if (currentCity) document.getElementById('overlay-city').classList.add('active');
}

function closeFiles() {
  document.getElementById('overlay-files').classList.remove('active');
  document.body.style.overflow = '';
  currentEmissora = null;
  currentCity = null;
}

// Close on backdrop
document.getElementById('overlay-city').addEventListener('click', function(e) {
  if (e.target === this) closeCity();
});
document.getElementById('overlay-files').addEventListener('click', function(e) {
  if (e.target === this) closeFiles();
});

// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('overlay-files').classList.contains('active')) closeFiles();
    else if (document.getElementById('overlay-city').classList.contains('active')) closeCity();
  }
});

// ── TOUCH / CLICK BINDINGS para as cidades no mapa ────────────
// Suporte a touch (mobile) e click (desktop)
const cityMap = {
  'dot-rondonopolis': 'rondonopolis',
  'dot-primavera':    'primavera',
  'dot-tangara':      'tangara',
  'dot-barra':        'barra'
};

Object.entries(cityMap).forEach(([elId, cityKey]) => {
  const el = document.getElementById(elId);
  if (!el) return;

  // Click (desktop)
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    openCity(cityKey);
  });

  // Touch (mobile) — evita delay de 300ms
  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    e.stopPropagation();
    openCity(cityKey);
  }, { passive: false });
});
</script>
