<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Agora de Comunicação</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8001D;
    --dark: #0a0a0a;
    --panel: #111111;
    --border: #222222;
    --text: #f0f0f0;
    --muted: #888888;
    --accent: #FF3B56;
    --gold: #FFB800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .logo-text span { color: var(--red); }

  .header-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── MAIN ── */
  main {
    padding-top: 64px;
    min-height: 100vh;
  }

  /* ── HERO / MAP SECTION ── */
  .hero {
    position: relative;
    min-height: calc(100vh - 64px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 5vw, 60px);
    letter-spacing: 6px;
    color: var(--text);
    text-align: center;
    margin-bottom: 8px;
  }
  .hero-title span { color: var(--red); }

  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 50px;
  }

  /* ── MAP WRAPPER ── */
  .map-wrapper {
    position: relative;
    width: 100%;
    max-width: 700px;
    margin: 0 auto;
  }

  .map-wrapper svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 0 40px rgba(232,0,29,0.15));
  }

  /* MT state path */
  .mt-path {
    fill: #1a1a1a;
    stroke: #444;
    stroke-width: 1.5;
    transition: fill 0.3s;
  }

  /* City dot + label */
  .city-group {
    cursor: pointer;
  }

  .city-group .city-dot {
    fill: var(--red);
    stroke: var(--accent);
    stroke-width: 2;
    r: 8;
    transition: r 0.2s, fill 0.2s;
    filter: drop-shadow(0 0 6px var(--red));
  }

  .city-group:hover .city-dot {
    r: 12;
    fill: var(--gold);
    filter: drop-shadow(0 0 12px var(--gold));
  }

  .city-group .city-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    fill: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    pointer-events: none;
    transition: fill 0.2s;
  }

  .city-group:hover .city-label {
    fill: var(--gold);
  }

  .city-group .city-count {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    fill: var(--muted);
    pointer-events: none;
  }

  /* ── PULSE ANIMATION ── */
  .pulse-ring {
    fill: none;
    stroke: var(--red);
    stroke-width: 1;
    opacity: 0;
    animation: pulse 2.5s ease-out infinite;
  }

  .city-group:nth-child(2) .pulse-ring { animation-delay: 0s; }
  .city-group:nth-child(3) .pulse-ring { animation-delay: 0.6s; }
  .city-group:nth-child(4) .pulse-ring { animation-delay: 1.2s; }
  .city-group:nth-child(5) .pulse-ring { animation-delay: 1.8s; }

  @keyframes pulse {
    0%   { r: 8; opacity: 0.8; }
    100% { r: 28; opacity: 0; }
  }

  /* ── OVERLAY PANELS ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.active { display: flex; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--panel);
    z-index: 1;
  }

  .panel-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--text);
  }
  .panel-header h2 span { color: var(--red); }

  .btn-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }

  .panel-body { padding: 20px 28px 28px; }

  /* ── EMISSORA CARDS ── */
  .emissora-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: #161616;
  }
  .emissora-card:hover {
    border-color: var(--red);
    background: #1d1010;
    transform: translateX(4px);
  }

  .emissora-info { display: flex; flex-direction: column; gap: 3px; }
  .emissora-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .emissora-type {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .emissora-arrow {
    color: var(--red);
    font-size: 20px;
    transition: transform 0.2s;
  }
  .emissora-card:hover .emissora-arrow { transform: translateX(4px); }

  /* ── DRIVE FILE LIST ── */
  .file-section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .file-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .loading-files {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .loading-files .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    background: #161616;
    gap: 12px;
    flex-wrap: wrap;
  }

  .file-meta { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-size {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-action {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: none;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-download { border-color: #2a4a2a; color: #5cdb5c; }
  .btn-download:hover { background: #1a3a1a; border-color: #5cdb5c; }

  .btn-view { border-color: #2a2a4a; color: #7c9dff; }
  .btn-view:hover { background: #1a1a3a; border-color: #7c9dff; }

  .btn-whatsapp { border-color: #2a4a2a; color: #25D366; }
  .btn-whatsapp:hover { background: #1a3a1a; border-color: #25D366; }

  .btn-action svg { width: 13px; height: 13px; }

  /* Back button inside panel */
  .btn-back {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .btn-back:hover { color: var(--red); }

  .error-msg {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .error-msg a {
    color: var(--red);
    text-decoration: none;
  }
  .error-msg a:hover { text-decoration: underline; }

  /* ── BOTTOM BAR ── */
  .bottom-hint {
    text-align: center;
    margin-top: 30px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  @media (max-width: 480px) {
    header { padding: 0 20px; }
    .file-actions { width: 100%; justify-content: flex-end; }
    .panel-body { padding: 16px 16px 24px; }
    .panel-header { padding: 18px 16px; }
  }
</style>
</head>
<body>

  <div class="panel">
    <div class="panel-header">
      <h2 id="files-panel-title">EMISSORA</h2>
      <button class="btn-close" onclick="closeFiles()">✕</button>
    </div>
    <div class="panel-body" id="files-panel-body">
      <!-- Files injected here -->
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const CITIES = {
  rondonopolis: {
    name: "Rondonópolis",
    emissoras: [
      { id: "agora-fm",    name: "Agora FM",                type: "Rádio FM",       folder: "1HoQdk1A-00VbOtuNXvJrqJ8S_Xn593NN" },
      { id: "jovem-roo",   name: "Jovem Pan Sulmatogrossense", type: "Rádio",        folder: "1iaomV55ZEJrDPaLtwGw1JQdPzbiOjzg4" },
      { id: "tv-cidade",   name: "TV Cidade",               type: "Televisão",      folder: "1V2vUnY2Ck4v3XIG6tkLiMI22snuA-XWk" },
      { id: "agora-mt-roo",name: "AGORA MT – ROO",          type: "Portal de Notícias", folder: "1MymIVUISw3zAjfJNt_rVmt7uHEGZWMQD" },
    ]
  },
  primavera: {

    emissoras: [

      { id: "agora-mt-pva",name: "AGORA MT – PVA",          type: "Portal de Notícias", folder: "1b7MBjEJOmSNyumfYuUt0ns6Wxj29wZlV" },
      { id: "radio-pvr",   name: "Rádio Primavera",         type: "Rádio",          folder: "100L5Xlv5i0WlwAiEZIbTAw2WxfSS1lIo" },
    ]
  },
  barra: {
    name: "Barra dos Garças",
    emissoras: [
      { id: "agora-mt-bga",name: "AGORA MT – BGA",          type: "Portal de Notícias", folder: "1n_oU4xjhGP2QsCsOVKP-mDFfYjexk4aU" },
      { id: "jovem-bga",   name: "Jovem Pan – Barra do Garças", type: "Rádio",      folder: "1AuAXeS6CXFCakuB2I1RJSmqlj2YebwFr" },
      { id: "tv-cidade-bga",name: "TV Cidade Record (BGA)", type: "Televisão",      folder: "1e4u8BGLDTXp--_oPU6hGQYVwvlhHvZFx" },
    ]
  },
  tangara: {
    name: "Tangará da Serra",
    emissoras: [
      { id: "tv-vale",     name: "TV Vale Record",          type: "Televisão",      folder: "1_yXSdmArFmOj6y2lcDtcDa-alconnYpr" },
      { id: "agora-mt-tga",name: "AGORA MT – TGA",          type: "Portal de Notícias", folder: "1LepXxUoJod9hV6tlBdP3xQYiYoo2bTBI" },
    ]
  }
};

let currentCity = null;
let currentEmissora = null;

// ── GOOGLE DRIVE API ──────────────────────────────────────────────────────
// Uses public Google Drive folder listing via gdown-style URL
async function fetchDriveFiles(folderId) {
  // We use the Google Drive public API export to list files
  // This works for publicly shared folders
  const url = `https://drive.google.com/drive/folders/${folderId}`;
  
  // Since direct API calls to Google Drive require auth,
  // we'll use a workaround via the folder's RSS/export URL
  // For shared public folders, we embed the folder view
  return null; // Will use embedded iframe approach
}

// ── OPEN CITY ─────────────────────────────────────────────────────────────
function openCity(cityKey) {
  currentCity = cityKey;
  const city = CITIES[cityKey];
  if (!city) return;

  document.getElementById('city-panel-title').innerHTML =
    city.name.split(' ').map((w,i) => i === 0 ? `<span>${w}</span>` : w).join(' ') || city.name;

  const body = document.getElementById('city-panel-body');
  body.innerHTML = `
    <div class="file-section-label">${city.emissoras.length} emissoras disponíveis</div>
    ${city.emissoras.map(e => `
      <div class="emissora-card" onclick="openEmissora('${cityKey}','${e.id}')">
        <div class="emissora-info">
          <div class="emissora-name">${e.name}</div>
          <div class="emissora-type">${e.type}</div>
        </div>
        <div class="emissora-arrow">›</div>
      </div>
    `).join('')}
  `;

  document.getElementById('overlay-city').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeCity() {
  document.getElementById('overlay-city').classList.remove('active');
  document.body.style.overflow = '';
  currentCity = null;
}

// ── OPEN EMISSORA ─────────────────────────────────────────────────────────
function openEmissora(cityKey, emId) {
  const city = CITIES[cityKey];
  const em = city.emissoras.find(e => e.id === emId);
  if (!em) return;
  currentEmissora = em;

  document.getElementById('files-panel-title').innerHTML =
    `<span>${em.name.split(' ')[0]}</span> ${em.name.split(' ').slice(1).join(' ')}`;

  const body = document.getElementById('files-panel-body');

  const driveUrl = `https://drive.google.com/drive/folders/${em.folder}`;

  body.innerHTML = `
    <button class="btn-back" onclick="backToCity()">← Voltar para ${city.name}</button>
    <div class="file-section-label">Arquivos da pasta</div>
    <div id="files-list">
      <div class="loading-files">
        <div class="spinner"></div>
        Carregando arquivos do Google Drive…
      </div>
    </div>
  `;

  document.getElementById('overlay-city').classList.remove('active');
  document.getElementById('overlay-files').classList.add('active');

  // Load files from Google Drive
  loadDriveFiles(em.folder, driveUrl);
}

// ── LOAD DRIVE FILES ──────────────────────────────────────────────────────
async function loadDriveFiles(folderId, folderUrl) {
  const listEl = document.getElementById('files-list');

  try {
    // Use Google Drive's public folder export page via CORS proxy approach
    // Since direct Drive folder API requires OAuth, we use the public share link
    // and parse the folder listing via the export URL
    const exportUrl = `https://drive.google.com/drive/folders/${folderId}`;

    // Try fetching via the Google Drive API v3 public endpoint (no auth needed for public folders)
    const apiUrl = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=AIzaSyD_placeholder&fields=files(id,name,mimeType,size,webViewLink,webContentLink)`;

    // Since we can't use a real API key here, we'll use the public folder embed
    // and show a direct link + message
    showFolderEmbed(folderId, folderUrl, listEl);

  } catch(e) {
    showFolderEmbed(folderId, folderUrl, listEl);
  }
}

// ── WHATSAPP SEND ─────────────────────────────────────────────────────────
function sendWhatsApp(fileUrl, fileName) {
  const emName = currentEmissora ? currentEmissora.name : 'Emissora';
  const msg = encodeURIComponent(
    `📢 *Grupo Agora de Comunicação*\n\n` +
    `Emissora: *${emName}*\n` +
    `Arquivo: ${fileName}\n\n` +
    `🔗 Acesse: ${fileUrl}`
  );
  window.open(`https://wa.me/?text=${msg}`, '_blank');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────
function backToCity() {
  document.getElementById('overlay-files').classList.remove('active');
  if (currentCity) {
    document.getElementById('overlay-city').classList.add('active');
  }
}

function closeFiles() {
  document.getElementById('overlay-files').classList.remove('active');
  document.body.style.overflow = '';
  currentEmissora = null;
  currentCity = null;
}

// Close on backdrop click
document.getElementById('overlay-city').addEventListener('click', function(e) {
  if (e.target === this) closeCity();
});
document.getElementById('overlay-files').addEventListener('click', function(e) {
  if (e.target === this) closeFiles();
});

// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('overlay-files').classList.contains('active')) closeFiles();
    else if (document.getElementById('overlay-city').classList.contains('active')) closeCity();
  }
});
</script>
