<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Downloads – Grupo Agora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary:#cc1616; --dark:#8b0e0e; --light:#e84040;
      --glow:rgba(204,22,22,0.5);
      --black:#080808; --black-3:#161616;
      --white:#f5f5f5; --grey:#555; --grey-lt:#999;
      --border:rgba(255,255,255,0.06); --radius:12px; --trans:0.25s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 85% 50% at 50% -5%,var(--glow) 0%,transparent 65%);pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--dark);border-radius:3px}
    @keyframes spin   {to{transform:rotate(360deg)}}
    @keyframes fadeUp {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ── HEADER ── */
    header{position:relative;z-index:10;overflow:hidden;
      background:linear-gradient(135deg,var(--dark) 0%,var(--primary) 55%,var(--light) 100%);
      box-shadow:0 6px 40px var(--glow)}
    header::before{content:'';position:absolute;inset:0;pointer-events:none;
      background:repeating-linear-gradient(-55deg,transparent,transparent 22px,rgba(255,255,255,.025) 22px,rgba(255,255,255,.025) 44px)}
    .header-inner{position:relative;max-width:1100px;margin:0 auto;padding:20px 26px 18px;display:flex;align-items:center;gap:20px}
    .back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;
      background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.18);border-radius:50px;
      color:rgba(255,255,255,.78);font-family:'Barlow Condensed',sans-serif;font-size:12px;
      font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;
      cursor:pointer;transition:all .25s ease;flex-shrink:0}
    .back-btn:hover{background:rgba(0,0,0,.45);color:#fff}
    .logo-wrap{flex-shrink:0;width:136px;height:86px;border-radius:10px;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,.5)}
    .logo-wrap img{width:100%;height:100%;object-fit:contain;padding:7px}
    .header-text{flex:1}
    .station-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,52px);
      line-height:.9;letter-spacing:2px;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.4)}
    .station-sub{font-family:'Barlow Condensed',sans-serif;font-size:clamp(12px,1.8vw,16px);
      font-style:italic;color:rgba(255,255,255,.55);margin-top:4px}
    .page-sub{display:inline-block;margin-top:9px;font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(10px,1.3vw,13px);font-weight:600;letter-spacing:4px;text-transform:uppercase;
      color:rgba(255,255,255,.38);border-top:1px solid rgba(255,255,255,.15);padding-top:7px}
    .header-deco{position:absolute;right:18px;top:50%;transform:translateY(-50%);opacity:.05;pointer-events:none}
    .header-deco svg{width:190px;height:190px}

    /* ── TOOLBAR ── */
    .toolbar{position:relative;z-index:5;max-width:1100px;margin:30px auto 0;padding:0 26px;display:flex;align-items:center;gap:13px;flex-wrap:wrap}
    .search-wrap{flex:1;min-width:200px;position:relative}
    .search-wrap .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none;display:flex}
    #searchInput{width:100%;padding:12px 16px 12px 44px;background:var(--black-3);border:1px solid var(--border);
      border-radius:50px;color:#f5f5f5;font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .25s,box-shadow .25s}
    #searchInput::placeholder{color:#555}
    #searchInput:focus{border-color:var(--light);box-shadow:0 0 0 3px rgba(204,22,22,.18)}
    .counter-badge{flex-shrink:0;background:var(--black-3);border:1px solid var(--border);border-radius:50px;
      padding:8px 18px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
      letter-spacing:1px;color:#999;white-space:nowrap;display:flex;align-items:center;gap:6px}
    .count-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--light);line-height:1}

    /* ── MAIN ── */
    main{position:relative;z-index:5;max-width:1100px;margin:24px auto 60px;padding:0 26px}
    #loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:80px 20px}
    .spinner{width:46px;height:46px;border:4px solid rgba(204,22,22,.14);border-top-color:var(--light);border-radius:50%;animation:spin .85s linear infinite}
    #loader p{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#555}
    #msgBox{display:none;text-align:center;padding:80px 20px}
    #msgBox .mi{font-size:54px;margin-bottom:16px;opacity:.4}
    #msgBox h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#999;margin-bottom:8px}
    #msgBox p{font-size:13px;color:#555;max-width:360px;margin:0 auto;line-height:1.7}
    #fileGrid{display:none;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px}

    /* ── CARD ── */
    .file-card{background:var(--black-3);border:1px solid var(--border);border-radius:var(--radius);
      padding:17px;display:flex;align-items:flex-start;gap:13px;
      transition:transform .25s,border-color .25s,box-shadow .25s;animation:fadeUp .4s ease both}
    .file-card:hover{transform:translateY(-3px);border-color:rgba(204,22,22,.38);box-shadow:0 9px 28px rgba(204,22,22,.16)}
    .pdf-icon{flex-shrink:0;width:42px;height:52px;border-radius:7px;display:flex;align-items:center;
      justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;
      color:#fff;position:relative;overflow:hidden;
      background:linear-gradient(145deg,var(--dark),var(--light));
      box-shadow:0 3px 12px var(--glow)}
    .pdf-icon::after{content:'';position:absolute;top:0;right:0;width:12px;height:12px;
      background:rgba(255,255,255,.18);clip-path:polygon(100% 0,100% 100%,0 0)}
    .file-info{flex:1;min-width:0}
    .file-name{font-weight:600;font-size:13px;color:#f5f5f5;line-height:1.4;word-break:break-word;margin-bottom:5px}
    .file-meta{font-size:11px;color:#555;margin-bottom:11px;display:flex;align-items:center;gap:4px}
    .file-actions{display:flex;gap:6px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;
      font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.5px;
      text-decoration:none;cursor:pointer;border:none;transition:background .25s,transform .25s,box-shadow .25s}
    .btn:active{transform:scale(.97)}
    .btn-view{background:var(--primary);color:#fff}
    .btn-view:hover{background:var(--light);box-shadow:0 4px 13px var(--glow)}
    .btn-download{background:rgba(255,255,255,.07);color:#999;border:1px solid var(--border)}
    .btn-download:hover{background:rgba(255,255,255,.13);color:#fff}
    .btn-whatsapp{background:rgba(37,211,102,.11);color:#25d366;border:1px solid rgba(37,211,102,.22)}
    .btn-whatsapp:hover{background:rgba(37,211,102,.21);color:#2be870;box-shadow:0 3px 11px rgba(37,211,102,.17)}

    footer{position:relative;z-index:5;border-top:1px solid var(--border);padding:26px 24px;text-align:center;font-size:12px;color:#444}
    footer strong{color:var(--light)}

    @media(max-width:600px){
      .header-inner{flex-wrap:wrap;gap:10px;padding:14px}
      .header-deco{display:none}
      .logo-wrap{width:106px;height:68px}
      .toolbar{flex-direction:column;align-items:stretch;padding:0 14px}
      .counter-badge{justify-content:center}
      main{padding:0 14px}
      #fileGrid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<header id="siteHeader">
  <div class="header-inner">
    <button class="back-btn" id="backBtn" onclick="goBack()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar
    </button>
    <div class="logo-wrap" id="logoWrap"><img id="logoImg" alt="Logo"/></div>
    <div class="header-text">
      <div class="station-name" id="stationName">—</div>
      <div class="station-sub"  id="stationSub"></div>
      <div class="page-sub">&#9660;&ensp;Downloads Oficiais&ensp;&#9660;</div>
    </div>
    <div class="header-deco" aria-hidden="true">
      <svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="86" stroke="white" stroke-width="6"/><circle cx="100" cy="100" r="60" stroke="white" stroke-width="4"/><circle cx="100" cy="100" r="34" stroke="white" stroke-width="3"/><circle cx="100" cy="100" r="13" fill="white"/></svg>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="search" id="searchInput" placeholder="Buscar arquivo por nome…" autocomplete="off"/>
  </div>
  <div class="counter-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="count-num" id="fileCount">–</span><span>arquivo(s) PDF</span>
  </div>
</div>

<main>
  <div id="loader"><div class="spinner"></div><p>Carregando arquivos…</p></div>
  <div id="msgBox"><div class="mi" id="msgIcon">📭</div><h3 id="msgTitle">Nenhum arquivo</h3><p id="msgText">Pasta vazia ou sem PDFs.</p></div>
  <div id="fileGrid" role="list"></div>
</main>

<footer><strong id="footerName">—</strong> &mdash; Downloads Oficiais<br/><small style="margin-top:5px;display:block;opacity:.4">Arquivos listados automaticamente via Google Drive API</small></footer>

  };

  var API_KEY = "AIzaSyDZyXSTkryWfoVP4-QSLlB3SiZK8-wsvKU";
  var allFiles = [];
  var params, folderId, stationName, stationSub, logoKey, logoBg, themeKey, cityKey;

  /* ── Read URL params ── */
  function init() {
    params      = new URLSearchParams(window.location.search);
    folderId    = params.get('folder') || '';
    stationName = params.get('name')   || 'Downloads';
    stationSub  = params.get('sub')    || '';
    logoKey     = params.get('logo')   || 'grp';
    logoBg      = params.get('logoBg') || '#111';
    themeKey    = params.get('theme')  || 'jp';
    cityKey     = params.get('city')   || '';

    /* Apply theme */
    var t = THEMES[themeKey] || THEMES.jp;
    var root = document.documentElement;
    root.style.setProperty('--primary', t.primary);
    root.style.setProperty('--dark',    t.dark);
    root.style.setProperty('--light',   t.light);
    root.style.setProperty('--glow',    t.glow);
    document.body.style.background = t.bg;
    document.querySelector('body::before');

    /* Fill header */
    document.getElementById('stationName').textContent = stationName;
    document.getElementById('stationSub').textContent  = stationSub;
    document.getElementById('footerName').textContent  = stationName;
    document.title = stationName + ' – Downloads';

    var logoWrap = document.getElementById('logoWrap');
    logoWrap.style.background = logoBg;
    document.getElementById('logoImg').src = LOGOS[logoKey] || LOGOS.jp;

    fetchFiles();
  }

  function goBack() {
    window.location.href = 'portal.html';
  }

  /* ── Helpers ── */
  function formatDate(iso) {
    if (!iso) return 'Data desconhecida';
    return new Date(iso).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function stripExt(n) { return n.replace(/\.pdf$/i,''); }

  function sendWhatsApp(event, fileId, fileName) {
    event.preventDefault(); event.stopPropagation();
    var url  = 'https://drive.google.com/file/d/' + fileId + '/view';
    var text = '\uD83D\uDCC4 *' + fileName + '*\n\nSegue o link para acesso ao arquivo:\n' + url;
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    return false;
  }

  function createCard(file, index) {
    var viewUrl = 'https://drive.google.com/file/d/' + file.id + '/view';
    var dlUrl   = 'https://drive.google.com/uc?export=download&id=' + file.id;
    var name    = stripExt(file.name);
    var date    = formatDate(file.modifiedTime);
    var fid     = file.id;

    var card = document.createElement('div');
    card.className = 'file-card';
    card.setAttribute('role','listitem');
    card.style.animationDelay = Math.min(index * 0.055, 0.6) + 's';
    card.innerHTML =
      '<div class="pdf-icon">PDF</div>' +
      '<div class="file-info">' +
        '<div class="file-name" title="' + file.name + '">' + name + '</div>' +
        '<div class="file-meta">' +
          '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
          date +
        '</div>' +
        '<div class="file-actions">' +
          '<a class="btn btn-view" href="' + viewUrl + '" target="_blank" rel="noopener">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Visualizar</a>' +
          '<a class="btn btn-download" href="' + dlUrl + '" target="_blank" rel="noopener">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Baixar</a>' +
          '<a class="btn btn-whatsapp" href="#" onclick="return sendWhatsApp(event,'' + fid + '','' + name.replace(/'/g,"\'") + '')">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>Enviar</a>' +
        '</div>' +
      '</div>';
    return card;
  }

  function renderFiles(files) {
    var grid = document.getElementById('fileGrid');
    var msg  = document.getElementById('msgBox');
    grid.innerHTML = '';
    if (files.length === 0) {
      grid.style.display = 'none';
      document.getElementById('msgIcon').textContent  = '🔍';
      document.getElementById('msgTitle').textContent = 'Nenhum resultado';
      document.getElementById('msgText').textContent  = 'Nenhum arquivo corresponde à busca.';
      msg.style.display = 'block'; return;
    }
    msg.style.display  = 'none';
    grid.style.display = 'grid';
    files.forEach(function(f,i) { grid.appendChild(createCard(f,i)); });
  }

  document.getElementById('searchInput').addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    renderFiles(q ? allFiles.filter(function(f){ return f.name.toLowerCase().includes(q); }) : allFiles);
  });

  async function fetchFiles() {
    var loader = document.getElementById('loader');
    var grid   = document.getElementById('fileGrid');
    var msg    = document.getElementById('msgBox');
    loader.style.display = 'flex'; grid.style.display = 'none'; msg.style.display = 'none';

    if (!folderId) {
      loader.style.display = 'none';
      document.getElementById('msgIcon').textContent  = '⚙️';
      document.getElementById('msgTitle').textContent = 'Pasta não configurada';
      document.getElementById('msgText').textContent  = 'Nenhum ID de pasta foi fornecido.';
      msg.style.display = 'block'; return;
    }

    var q      = encodeURIComponent("'" + folderId + "' in parents and mimeType='application/pdf' and trashed=false");
    var fields = encodeURIComponent('files(id,name,modifiedTime),nextPageToken');
    var order  = encodeURIComponent('modifiedTime desc');
    var fetched = [], pageToken = '';

    try {
      do {
        var url = 'https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=' + fields + '&orderBy=' + order + '&pageSize=200&key=' + API_KEY;
        if (pageToken) url += '&pageToken=' + encodeURIComponent(pageToken);
        var resp = await fetch(url);
        if (!resp.ok) {
          var err = await resp.json().catch(function(){return{}});
          throw new Error((err.error && err.error.message) || 'Erro HTTP ' + resp.status);
        }
        var data = await resp.json();
        fetched  = fetched.concat(data.files || []);
        pageToken = data.nextPageToken || '';
      } while (pageToken);

      allFiles = fetched;
      document.getElementById('fileCount').textContent = allFiles.length;
      loader.style.display = 'none';

      if (allFiles.length === 0) {
        document.getElementById('msgIcon').textContent  = '📭';
        document.getElementById('msgTitle').textContent = 'Nenhum arquivo encontrado';
        document.getElementById('msgText').textContent  = 'Esta pasta não contém PDFs ou não está pública.';
        msg.style.display = 'block'; return;
      }
      renderFiles(allFiles);
    } catch(err) {
      console.error(err);
      loader.style.display = 'none';
      document.getElementById('msgIcon').textContent  = '⚠️';
      document.getElementById('msgTitle').textContent = 'Erro ao carregar';
      document.getElementById('msgText').textContent  = err.message + '. Verifique a API Key e se a pasta é pública.';
      msg.style.display = 'block';
    }
  }

  init();
</script>
</body>
</html>
